<html>
<head>
<title>Number Guess</title>

<style>
body
{
 font-family:Arial;
 text-align:center;
}
button
{
 padding:6px;
 margin:5px;
}
.dark
{
 background:black;
 color:white;
}
</style>
</head>

<body>
<fieldset style="background-color:cyan" ><legend>Guess Game</legend>
<h2>Number Guess Game</h2>
<p>Guess number between 1 and 10</p>

<input type="number" id="guess">
<br>
<button onclick="check()">Guess</button>
<button onclick="resetGame()">Reset</button>
<button onclick="toggleTheme()">Theme</button>

<p id="result"></p>

<h3>Leaderboard (Total Score)</h3>
<ul id="board"></ul>

<a href="games.html">Back</a>
</fieldset>
<script>

let random=Math.floor(Math.random()*10)+1;
let attempts=0;

function check(){
attempts++;
let g=document.getElementById("guess").value;

if(g==random){
let score=10-attempts;
document.getElementById("result").innerText="You Win! +" + score;

saveScore(score);
showBoard();
resetGame();
}
else{
document.getElementById("result").innerText="Wrong! Try Again";
}
}

function saveScore(score){
let scores=JSON.parse(localStorage.getItem("guessGame"))||[];
scores.push({name:localStorage.getItem("user"),score:score});
localStorage.setItem("guessGame",JSON.stringify(scores));
}

function resetGame(){
random=Math.floor(Math.random()*10)+1;
attempts=0;
document.getElementById("guess").value="";
}

function showBoard(){

let scores=JSON.parse(localStorage.getItem("guessGame"))||[];

let total={};

scores.forEach(s=>{
total[s.name]=(total[s.name]||0)+s.score;
});

let final=Object.keys(total).map(n=>({name:n,score:total[n]}));
final.sort((a,b)=>b.score-a.score);

let list=document.getElementById("board");
list.innerHTML="";

final.slice(0,5).forEach(s=>{
let li=document.createElement("li");
li.innerText=s.name+" - "+s.score;
list.appendChild(li);
});
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

showBoard();

</script>
</body>
</html>
