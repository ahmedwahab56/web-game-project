html>
<head>
<title>Gaming Platform</title>

<style>
body{
font-family:Arial;
text-align:center;
}

.dark{
background:black;
color:white;
}

a{
display:block;
margin:10px;
}

ul{
list-style:none;
padding:0;
}
</style>

</head>
<body>
<fieldset style="background-color:gray" ><legend>Index</legend>
<h1>Frontend Gaming Platform</h1>

<a href="register.html">Register</a>
<a href="dashboard.html">Dashboard</a>
<a href="games.html">Go to Games</a>

<button onclick="toggleTheme()">Toggle Theme</button>

<hr>

<h2>🏆 Number Guess Leaderboard</h2>
<ul id="guessBoard"></ul>

<h2>🏆 Rock Paper Scissors Leaderboard</h2>
<ul id="rpsBoard"></ul>

<h2>🏆 Tic Tac Toe Leaderboard</h2>
<ul id="tttBoard"></ul>
</fieldset>

<script>

function toggleTheme(){
document.body.classList.toggle("dark");
}

function showBoard(storageKey, elementId){

let scores = JSON.parse(localStorage.getItem(storageKey)) || [];

let total = {};

scores.forEach(s=>{
total[s.name] = (total[s.name] || 0) + s.score;
});
let final = Object.keys(total).map(name=>{
return {name:name, score:total[name]};
});

final.sort((a,b)=>b.score-a.score);

let list = document.getElementById(elementId);
list.innerHTML = "";

final.slice(0,5).forEach(s=>{
let li=document.createElement("li");
li.innerText = s.name + " - " + s.score;
list.appendChild(li);
});
}
showBoard("guessGame","guessBoard");
showBoard("rpsGame","rpsBoard");
showBoard("tttGame","tttBoard");

</script>

</body>
</html>
